<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="description" content="KI-produzierte Produktbilder &amp; Video-Ads für Fashion, Lifestyle, Beauty und Food. Studio-Qualität ab 299 €, Lieferung in 48h — ohne Fotoshooting. Duketus Productions, Hamburg.">
<meta name="keywords" content="KI Produktbilder, AI Product Photography, Video Ads, Fashion Content, Lifestyle Content, Beauty Content, Food Content, Hamburg, AI Content Services">
<meta property="og:title" content="Duketus Productions — AI Content Services">
<meta property="og:description" content="KI-produzierte Produktbilder &amp; Video-Ads. Studio-Qualität ab 299 €, Lieferung in 48h.">
<meta property="og:url" content="https://duketus-productions.de">
<meta name="robots" content="index, follow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duketus Productions — AI Content Services</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2318182F'/><rect x='1' y='1' width='30' height='30' rx='5' fill='none' stroke='%23FF6B2B' stroke-width='1.5' opacity='0.4'/><text x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Arial Black,Arial,sans-serif' font-weight='900' font-size='21' fill='%23FF6B2B'>D</text></svg>">
<link rel="alternate icon" href="data:image/png;base64,iVBORw0KGgo=">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & TOKENS ─────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
:root{
  --orange:#FF6B2B; --orange-l:#FF9A6C; --orange-t:#FFF1E8; --orange-b:#FFB899;
  --navy:#18182F; --navy-m:#232340;
  --cream:#F9F7F4; --white:#fff;
  --text:#1C1C1C; --muted:#6B6B6B;
  --warm:#EEE9E2; --blue:#9BA3BB;
  --line:#E8E2DB;
  --sh0:0 2px 8px rgba(24,24,47,.07);
  --sh1:0 4px 20px rgba(24,24,47,.11);
  --sh2:0 8px 40px rgba(24,24,47,.17);
}
body{font-family:'Poppins',sans-serif;background:var(--cream);color:var(--text);line-height:1.6;overflow-x:hidden}
button,input,textarea,select{font-family:'Poppins',sans-serif}
a{text-decoration:none}
.mono{font-family:'IBM Plex Mono',monospace}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.au{animation:fadeUp .6s ease both}
.ai{animation:fadeIn .5s ease both}
.d1{animation-delay:.1s}.d2{animation-delay:.2s}.d3{animation-delay:.3s}
.d4{animation-delay:.4s}.d5{animation-delay:.5s}

/* ── LAYOUT ── */
.container{max-width:1100px;margin:0 auto;padding:0 40px}
.page{display:none;min-height:calc(100vh - 62px)}
.page.active{display:block}

/* ── EYEBROW ── */
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;
  letter-spacing:.18em;text-transform:uppercase;color:var(--orange);
  display:flex;align-items:center;gap:8px;margin-bottom:12px}
.eyebrow::before{content:'';width:20px;height:1px;background:var(--orange)}

/* ── TAG ── */
.tag{display:inline-flex;align-items:center;padding:3px 11px;border-radius:4px;
  background:var(--orange-t);border:1px solid var(--orange-b);
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;
  color:var(--orange);letter-spacing:.06em;white-space:nowrap}
.tag-dark{background:var(--navy-m);border-color:rgba(255,107,43,.2);color:var(--warm)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 26px;border-radius:6px;font-size:14px;font-weight:600;
  border:none;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--orange);color:#fff;box-shadow:0 4px 14px rgba(255,107,43,.3)}
.btn-primary:hover{background:#e85a1e;transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,107,43,.4)}
.btn-outline{background:transparent;color:var(--warm);border:1px solid rgba(155,163,187,.3)}
.btn-outline:hover{border-color:var(--orange);color:var(--orange);background:rgba(255,107,43,.06)}
.btn-ghost{background:transparent;color:var(--orange);border:1.5px solid var(--orange-b)}
.btn-ghost:hover{background:var(--orange-t)}
.btn-sm{padding:8px 18px;font-size:13px}
.btn-lg{padding:14px 32px;font-size:15px}
.btn-full{width:100%}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;height:62px;z-index:200;
  background:rgba(24,24,47,.97);backdrop-filter:blur(12px);
  border-bottom:2px solid var(--orange);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;gap:24px}
.nav-logo{font-size:14px;font-weight:700;color:var(--warm);cursor:pointer;
  display:flex;align-items:center;gap:3px;white-space:nowrap;background:none;border:none}
.nav-logo .dot{color:var(--orange)}
.nav-logo .sub{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:400;
  color:var(--blue);margin-left:8px;letter-spacing:.05em;
  border-left:1px solid rgba(155,163,187,.25);padding-left:8px}
.nav-links{display:flex;gap:2px;list-style:none}
.nav-btn{font-size:12px;font-weight:500;color:var(--blue);padding:6px 14px;
  border-radius:4px;background:none;border:none;cursor:pointer;transition:all .18s}
.nav-btn:hover,.nav-btn.active{color:var(--warm);background:rgba(255,107,43,.1)}
.nav-btn.active{color:var(--orange)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;
  background:none;border:none;padding:4px}
.hamburger span{width:22px;height:1.5px;background:var(--warm);transition:all .25s;display:block}
.ham-open span:nth-child(1){transform:rotate(45deg) translateY(6.5px)}
.ham-open span:nth-child(2){opacity:0}
.ham-open span:nth-child(3){transform:rotate(-45deg) translateY(-6.5px)}

/* ── MOBILE MENU ── */
.mobile-menu{display:none;position:fixed;inset:62px 0 0 0;z-index:199;
  background:rgba(24,24,47,.98);backdrop-filter:blur(12px);
  flex-direction:column;align-items:center;justify-content:center;gap:8px;
  animation:fadeIn .2s ease}
.mobile-menu.open{display:flex}
.mob-btn{font-size:18px;font-weight:600;color:var(--warm);background:none;border:none;
  cursor:pointer;padding:12px 32px;border-radius:6px;width:220px;text-align:center;
  transition:all .18s}
.mob-btn:hover,.mob-btn.active{color:var(--orange);background:rgba(255,107,43,.08)}

/* ── HERO ── */
.hero{background:var(--navy);min-height:100vh;padding:120px 0 80px;padding-top:calc(62px + 58px);display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden}
.hero-inner{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;min-height:calc(100vh - 160px)}
.hero-grid{position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,107,43,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,107,43,.04) 1px,transparent 1px);
  background-size:48px 48px}
.hero-corner{position:absolute;pointer-events:none;width:28px;height:28px}
.hero-corner::before,.hero-corner::after{content:'';position:absolute;
  border-color:rgba(255,107,43,.25);border-style:solid;width:28px;height:28px}
.hero-corner.tl{top:80px;left:32px}
.hero-corner.tl::before{top:0;left:0;border-width:1px 0 0 1px}
.hero-corner.br{bottom:40px;right:32px}
.hero-corner.br::after{bottom:0;right:0;border-width:0 1px 1px 0}
.hero-glow{position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,107,43,.06) 0%,transparent 68%);
  pointer-events:none}

/* ── PAGE BANNER ── */
.page-banner{background:var(--navy);padding:60px 0 52px;
  border-bottom:2px solid var(--orange);position:relative;overflow:hidden}
.page-banner .hero-grid{opacity:.6}

/* ── CARDS ── */
.card{background:var(--white);border-radius:8px;border:1px solid var(--line);
  box-shadow:var(--sh0);transition:transform .25s,box-shadow .25s,border-color .25s;
  overflow:hidden;position:relative}
.card:hover{transform:translateY(-4px);box-shadow:var(--sh1);border-color:var(--orange-b)}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--orange);transform:scaleX(0);transition:transform .25s;transform-origin:left}
.card:hover::before{transform:scaleX(1)}

/* ── SERVICE CARD ── */
.service-card{background:var(--white);border-radius:8px;padding:32px;
  border:1px solid var(--line);box-shadow:var(--sh0);
  transition:all .25s;position:relative;overflow:hidden}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--orange),var(--orange-l),transparent);
  transform:scaleX(0);transition:transform .3s;transform-origin:left}
.service-card:hover{transform:translateY(-4px);box-shadow:var(--sh1);border-color:var(--orange-b)}
.service-card:hover::before{transform:scaleX(1)}
.feat-li{font-size:13px;padding:7px 0;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px}
.feat-li::before{content:"→";color:var(--orange);font-family:'IBM Plex Mono',monospace;font-size:11px;flex-shrink:0}

/* ── PROCESS BOX ── */
.process-box{background:var(--navy);border-radius:10px;padding:40px;
  position:relative;overflow:hidden}
.process-box .hero-grid{opacity:.5}

/* ── CORNER BRACKETS ── */
.corner{position:absolute;width:16px;height:16px}
.corner.tl{top:0;left:0;border-top:1px solid rgba(255,107,43,.3);border-left:1px solid rgba(255,107,43,.3)}
.corner.br{bottom:0;right:0;border-bottom:1px solid rgba(255,107,43,.3);border-right:1px solid rgba(255,107,43,.3)}
.corner.tr{top:0;right:0;border-top:1px solid rgba(255,107,43,.3);border-right:1px solid rgba(255,107,43,.3)}
.corner.bl{bottom:0;left:0;border-bottom:1px solid rgba(255,107,43,.3);border-left:1px solid rgba(255,107,43,.3)}

/* ── PORTFOLIO ── */
.port-card{border-radius:8px;overflow:hidden;position:relative;
  aspect-ratio:9/16;cursor:pointer;border:1px solid var(--line);
  box-shadow:var(--sh0);transition:all .25s}
.port-card:hover{transform:translateY(-4px);box-shadow:var(--sh2);border-color:var(--orange)}
.port-overlay{position:absolute;inset:0;background:rgba(24,24,47,.6);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .25s}
.port-card:hover .port-overlay{opacity:1}
.play-btn{width:54px;height:54px;border-radius:50%;background:var(--orange);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;box-shadow:0 4px 20px rgba(255,107,43,.5);
  transition:transform .2s}
.port-card:hover .play-btn{transform:scale(1.08)}
.port-grid-inner{position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(255,107,43,.06) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,107,43,.06) 1px,transparent 1px);
  background-size:24px 24px}
.port-bottom{position:absolute;bottom:0;left:0;right:0;padding:28px 14px 14px;
  background:linear-gradient(transparent,rgba(24,24,47,.92))}

/* ── CAT TABS ── */
.cat-tab{padding:7px 18px;border-radius:4px;
  border:1px solid var(--line);background:var(--white);color:var(--muted);
  cursor:pointer;transition:all .2s;
  font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.05em}
.cat-tab:hover{border-color:var(--orange-b);color:var(--orange);background:var(--orange-t)}
.cat-tab.active{background:var(--orange);border-color:var(--orange);color:#fff;
  box-shadow:0 3px 12px rgba(255,107,43,.3)}
.cat-tab:disabled{opacity:.4;cursor:not-allowed}

/* ── PRICING ── */
.price-card{background:var(--white);border-radius:8px;padding:36px 28px;
  border:1px solid var(--line);box-shadow:var(--sh0);position:relative;transition:all .25s}
.price-card:hover{transform:translateY(-5px);box-shadow:var(--sh1)}
.price-card.featured{background:var(--navy);border-color:var(--orange);
  box-shadow:0 8px 40px rgba(255,107,43,.18)}
.price-card.featured:hover{box-shadow:0 12px 50px rgba(255,107,43,.28)}
.feat-badge{position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  background:var(--orange);color:#fff;font-size:10px;font-weight:600;
  padding:4px 16px;border-radius:999px;white-space:nowrap;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.08em}
.price-feat-li{font-size:13.5px;padding:8px 0;border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:10px}
.price-feat-li::before{content:"→";color:var(--orange);font-family:'IBM Plex Mono',monospace;font-size:11px;flex-shrink:0}
.price-card.featured .price-feat-li{border-color:rgba(155,163,187,.12);color:var(--warm)}

/* ── STATS ── */
.stat-num{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;color:var(--orange);line-height:1}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--blue);
  margin-top:4px;letter-spacing:.1em;text-transform:uppercase}

/* ── FORM ── */
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);
  margin-bottom:6px;text-transform:uppercase;letter-spacing:.08em;
  font-family:'IBM Plex Mono',monospace}
.form-input{width:100%;padding:11px 14px;border-radius:6px;
  border:1px solid var(--line);background:var(--cream);color:var(--text);
  font-size:14px;outline:none;transition:all .2s}
.form-input:focus{border-color:var(--orange);background:var(--white);
  box-shadow:0 0 0 3px rgba(255,107,43,.08)}
.form-input::placeholder{color:rgba(107,107,107,.6)}

/* ── CONTACT ── */
.contact-row{display:flex;align-items:flex-start;gap:14px;padding:14px 0;border-bottom:1px solid var(--line)}
.contact-icon{width:40px;height:40px;border-radius:8px;background:var(--orange-t);
  border:1px solid var(--orange-b);display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0}

/* ── MODAL ── */
.modal-bd{display:none;position:fixed;inset:0;z-index:500;
  background:rgba(24,24,47,.88);backdrop-filter:blur(10px);
  align-items:center;justify-content:center;padding:16px}
.modal-bd.open{display:flex;animation:fadeIn .2s ease}
.modal-box{width:100%;max-width:min(380px,92vw);background:var(--white);border-radius:10px;
  overflow:hidden;box-shadow:var(--sh2);animation:scaleIn .25s ease;position:relative}
.modal-x{position:absolute;top:12px;right:12px;z-index:10;width:32px;height:32px;
  border-radius:50%;background:rgba(24,24,47,.7);border:none;color:#fff;
  font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s}
.modal-x:hover{background:var(--orange)}
.modal-vid{position:relative;aspect-ratio:9/16;background:var(--navy);max-height:75vh}
.modal-vid video,.modal-vid iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.modal-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;background:var(--navy-m)}
.modal-meta{padding:14px 18px;display:flex;align-items:center;
  justify-content:space-between;gap:12px;border-top:1px solid var(--line)}

/* ── FOOTER ── */
.footer{background:var(--navy);border-top:2px solid var(--orange);
  padding:28px 40px;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:12px}
.foot-link{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--blue);
  cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;background:none;border:none}
.foot-link:hover{color:var(--orange)}

/* ── COMING SOON ── */
.coming-soon{border:1.5px dashed var(--line);border-radius:10px;padding:60px 32px;
  text-align:center;background:var(--orange-t)}

/* ── GRIDS ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.grid-port{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

/* ── COMING SOON DOT ── */
.live-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;
  box-shadow:0 0 5px #4ade80;display:inline-block;flex-shrink:0}


/* Info box highlight animation */
@keyframes tipHighlight{
  0%{box-shadow:0 0 0 0 rgba(255,107,43,0);border-color:var(--orange-b)}
  30%{box-shadow:0 0 0 6px rgba(255,107,43,.25);border-color:var(--orange)}
  70%{box-shadow:0 0 0 4px rgba(255,107,43,.15);border-color:var(--orange)}
  100%{box-shadow:0 0 0 0 rgba(255,107,43,0);border-color:var(--orange-b)}
}
.tip-flash{animation:tipHighlight 1.4s ease forwards}

/* ── HERO SLIDESHOW ── */
  /* Hide slide placeholder text when image is present */
  .hero-slide img[src]:not([src=""]) ~ .slide-placeholder { display:none !important; }

.hero-slide{
  position:absolute;inset:0;opacity:0;
  transition:opacity .9s ease;
  display:flex;align-items:center;justify-content:center;
  background-image:linear-gradient(rgba(255,107,43,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,107,43,.05) 1px,transparent 1px);
  background-size:32px 32px;
}
.hero-slide.active{opacity:1}
.hero-slide img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;opacity:.85;transition:opacity .9s ease;
}
.slide-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,107,43,.3);border:1px solid rgba(255,107,43,.4);
  cursor:pointer;transition:all .2s;flex-shrink:0;
}
.slide-dot.active{background:var(--orange);box-shadow:0 0 6px rgba(255,107,43,.5)}


/* ── DESKTOP SLIDESHOW HEIGHT FIX ── */
@media(min-width:769px){
  .hero-visual{height:calc(100vh - 140px);display:flex;flex-direction:column;justify-content:center}
  .hero-visual>div:first-child{flex:1;display:flex;flex-direction:column;max-height:calc(100vh - 140px)}
  #slideshow{flex:1 !important;aspect-ratio:unset !important;min-height:0}
}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .container{padding:0 24px}
  .nav{padding:0 24px}
  .footer{padding:24px}
  .grid-3{grid-template-columns:1fr 1fr !important}
}
@media(max-width:768px){
  .container{padding:0 18px}
  .nav{padding:0 18px}
  .nav-links,.nav-cta{display:none !important}
  .hamburger{display:flex !important}
  .hero{padding:calc(62px + 40px) 0 56px}
  .hero-inner{grid-template-columns:1fr !important;gap:28px}
  .hero-visual{display:block !important;width:100% !important;max-width:100% !important;margin:0 !important}
  .hero-visual>div{width:100% !important;display:block}
  #slideshow{aspect-ratio:4/5 !important;width:100% !important;max-height:none !important}
  
  .hero-float-badge{display:none !important}
  .hero-corner{display:none !important}
  .grid-stats{max-width:100% !important;width:100% !important}
  .grid-2,.grid-3,.grid-pricing{grid-template-columns:1fr !important}
  .hero-cta{flex-direction:column;align-items:flex-start}
  .hero-cta .btn{width:100%}
  .contact-grid{grid-template-columns:1fr !important}
  .form-row{grid-template-columns:1fr !important}
  .process-grid{grid-template-columns:1fr 1fr !important}
  .footer{flex-direction:column;align-items:flex-start;gap:16px;padding:24px 18px}
  .footer-links{flex-wrap:wrap;gap:12px}
  .nav-logo .sub{display:none}
}
@media(max-width:480px){
  .grid-stats{grid-template-columns:repeat(3,1fr) !important}
  .cat-tab{padding:6px 12px;font-size:10px}
}
</style>
</head>
<body>

<!-- ═══ NAV ═══════════════════════════════════════════════════════════════ -->
<nav class="nav">
  <button class="nav-logo" onclick="showPage('home')">
    Duketus<span class="dot">.</span>Productions
    <span class="sub">AI Content Services</span>
  </button>
  <ul class="nav-links" id="nav-links">
    <li><button class="nav-btn active" data-page="home" onclick="showPage('home')">Home</button></li>
    <li><button class="nav-btn" data-page="services" onclick="showPage('services')">Services</button></li>
    <li><button class="nav-btn" data-page="portfolio" onclick="showPage('portfolio')">Portfolio</button></li>
    <li><button class="nav-btn" data-p
